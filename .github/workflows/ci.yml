name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHONHASHSEED: "0"
  CUBLAS_WORKSPACE_CONFIG: ":4096:8"
  TOKENIZERS_PARALLELISM: "false"
  RANDOM_SEED: "0"

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
      - run: uv python install 3.11.9
      - run: uv sync --frozen --dev
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy src/

  shell-tests:
    name: Shell Tests (bats-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install bats-core
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
      - name: Run shell tests
        env:
          LOG_LEVEL: "2"
        run: bats --tap tests/shell/test_lib.bats tests/shell/test_bootstrap_env.bats tests/shell/test_preflight.bats tests/shell/test_failure_paths.bats
      - name: Run artifact verification tests
        env:
          LOG_LEVEL: "2"
        run: bats --tap tests/shell/test_artifact_verification.bats

  unit-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
      - run: uv python install 3.11.9
      - run: uv sync --frozen --dev
      - name: Run unit tests
        run: uv run pytest tests/ -m unit -q --tb=short --strict-markers --cov=src --cov-report=xml --cov-report=term-missing
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  cpu-smoke:
    name: CPU Inference Smoke Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
      - run: uv python install 3.11.9
      - run: uv sync --frozen --dev
      - name: Write CI reproducibility env
        run: python scripts/ci_write_env.py
      - name: CPU inference forward pass
        run: |
          uv run python -c "
          import torch, torch.nn as nn
          from transformers import AutoTokenizer
          tok = AutoTokenizer.from_pretrained('bert-base-uncased')
          ids = tok('The court ruled.', return_tensors='pt')
          assert ids['input_ids'].shape[1] > 0
          class M(nn.Module):
              def __init__(self):
                  super().__init__()
                  self.e = nn.Embedding(tok.vocab_size, 32)
                  self.f = nn.Linear(32, 2)
              def forward(self, x): return self.f(self.e(x).mean(1))
          m = M().eval()
          with torch.no_grad():
              p = torch.softmax(m(ids['input_ids']), -1)
          assert p.shape == (1, 2) and abs(p.sum().item() - 1.0) < 1e-5
          print('CPU forward pass ok')
          "
      - name: FAISS vector store integrity
        run: |
          uv run python -c "
          import numpy as np, faiss
          dim, n = 128, 500
          q = faiss.IndexFlatL2(dim)
          idx = faiss.IndexIVFFlat(q, dim, 16, faiss.METRIC_L2)
          vecs = np.random.randn(n, dim).astype('float32')
          faiss.normalize_L2(vecs)
          idx.train(vecs); idx.add(vecs); idx.nprobe = 4
          D, I = idx.search(vecs[:10], 5)
          hits = sum(1 for i in range(10) if i in I[i])
          assert hits >= 7, f'{hits}/10'
          print(f'FAISS ok: {hits}/10 self-queries')
          "

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
      - run: uv python install 3.11.9
      - run: uv sync --frozen --dev
      - name: Run pip-audit (non-blocking)
        run: |
          mkdir -p logs
          uv run pip-audit --format=json --progress-spinner=off --output=logs/pip-audit.json 2>&1 || true
          uv run python scripts/ci_audit_report.py logs/pip-audit.json
      - name: Generate SBOM
        run: |
          mkdir -p logs
          uv run python -m cyclonedx_py environment --of JSON --output-file logs/sbom.json || true
          uv run python -m cyclonedx_py environment --of XML  --output-file logs/sbom.xml  || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-artifacts
          path: logs/
          retention-days: 30
