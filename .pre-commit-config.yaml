# .pre-commit-config.yaml
# Path: cs1090b_HallucinationLegalRAGChatbots/.pre-commit-config.yaml
# Adapted for OOD GPU Cluster — Python/uv/torch stack, no frontend/Docker.
# Install: uv run pre-commit install && uv run pre-commit install --hook-type pre-push
# Run all: uv run pre-commit run --all-files

repos:
  # ---- Secret Detection ----
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: .*\.lock$|.*\.log$|logs/.*

  # ---- Local Security Hooks ----
  - repo: local
    hooks:
      - id: block-large-files
        name: Block Large Model/Binary Files
        entry: sh -c 'git diff --cached --name-only | grep -qE "\.(h5|pkl|pth|onnx|parquet|sqlite3|bin|pt|safetensors)$" && echo "ERROR - Large model/binary file detected. Use DVC or HF Hub instead. Remove with: git rm --cached <file>" && exit 1 || exit 0'
        language: system
        pass_filenames: false

      - id: check-env-files
        name: Block .env Files
        entry: sh -c 'git diff --cached --name-only | grep -qE "^\.env(\..+)?$" && echo "ERROR - .env file detected. Never commit secrets!" && exit 1 || exit 0'
        language: system
        pass_filenames: false

      - id: block-cluster-credentials
        name: Block Cluster Credential Files
        entry: sh -c 'git diff --cached --name-only | grep -qE "(\.pem|\.key|id_rsa|id_ed25519|\.netrc|\.git-credentials)$" && echo "ERROR - Credential file detected. Never commit SSH keys or tokens!" && exit 1 || exit 0'
        language: system
        pass_filenames: false

      - id: verify-selective-staging
        name: Verify Selective Staging
        entry: sh -c 'echo "Staged files:" && git diff --cached --name-only'
        language: system
        pass_filenames: false
        stages: [pre-commit]

  # ---- Standard File Hygiene ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: mixed-line-ending
        args: ['--fix=lf']
        name: Fix Line Endings to LF
      - id: end-of-file-fixer
        name: Fix End of Files
        exclude: .*\.lock$|logs/.*
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        exclude: .*\.lock$|logs/.*
      - id: check-json
        name: Validate JSON Files
      - id: check-yaml
        name: Validate YAML Files
      - id: check-added-large-files
        args: ['--maxkb=500']
        name: Check for Large Files (500KB max)
      - id: check-merge-conflict
        name: Check for Merge Conflict Markers
      - id: check-symlinks
        name: Check for Broken Symlinks

  # ---- Python Quality (pre-commit: fast) ----
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Lint
        entry: uv run ruff check src/ tests/ --fix
        language: system
        pass_filenames: false

      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format src/ tests/
        language: system
        pass_filenames: false

      - id: mypy
        name: Mypy Type Check
        entry: uv run mypy src/
        language: system
        pass_filenames: false

  # ---- Pre-commit: Quick Unit Tests ----
  - repo: local
    hooks:
      - id: pytest-quick
        name: Pytest Unit Tests (fast gate)
        entry: uv run pytest tests/ -m unit -q --tb=short --no-header
        language: system
        pass_filenames: false

  # ---- Pre-push: Coverage + Security ----
  - repo: local
    hooks:
      - id: pytest-coverage-push
        name: Pytest Coverage (unit + contract, 80% min)
        entry: bash -c 'echo "========================================"
          && echo "  COVERAGE GATE - 80% Per-File Min"
          && echo "========================================"
          && uv run pytest tests/ -m "unit or contract" -q --tb=short --cov=src --cov-report=term-missing --no-header
          && echo "PASSED - Coverage gate green"
          || (echo "FAILED - Fix coverage before push" && exit 1)'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: security-audit-push
        name: Security Audit (pip-audit, non-blocking)
        entry: bash -c 'mkdir -p logs && uv run pip-audit --format=json --progress-spinner=off --output=logs/pip-audit-precommit.json 2>&1 || true && uv run python scripts/ci_audit_report.py logs/pip-audit-precommit.json'
        language: system
        pass_filenames: false
        stages: [pre-push]
